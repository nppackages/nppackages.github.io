title: NP Packages
tagline: NP Software Packages
description: Software packages for nonparametric and semiparametric methods.
keywords: nonparametric, semiparametric, smoothing, Python, R, Stata
url: https://nppackages.github.io
baseurl: ""
repository: nppackages/nppackages.github.io
lang: en-US
timezone: America/New_York

author:
  name: NP Packages
  email: nppackages@googlegroups.com
  url: https://nppackages.github.io

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

strict_front_matter: true

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page

exclude:
  - README.md
  - AGENTS.md
  - LICENSE.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - .bundle
  - .jekyll-cache
  - .jekyll-metadata
  - .jekyll-preview.*
  - .tmp
  - _site
  - vendor
  - "*.log"

version: 3.1.0
